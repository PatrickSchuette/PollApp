<section class="home">
    <div class="hero">
        <div class="hero-text">
            <h1>Collect Feedback, Unlock Ideas</h1>
            <p>Create and share surveys in minutes – from team events to workplace culture. Collect opinions, engage
                your audience, and turn feedback into action.</p>
                <button class="button">New survey</button>
        </div>

        <div class="hero-image"></div>
    </div>

    <h2>Ending Soon</h2>
    <app-ending-soon [surveys]="endingSoon"></app-ending-soon>
    
    <h2>Active Surveys</h2>
    <app-survey-list [surveys]="active"></app-survey-list>
    
    <h2>Past Surveys</h2>
    <app-survey-list [surveys]="past"></app-survey-list>
    
</section>
