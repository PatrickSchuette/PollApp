<section class="home">

    <div class="home-top">
        <header class="main-header">
            <img src="./assets/img/logo.svg" alt="Logo" class="logo" />
        </header>

        <div class="hero-section">
            <div class="hero-content">
                <h1 class="hero-title">Collect Feedback, Unlock Ideas</h1>

                <p class="hero-text">
                    Create and share surveys in minutes – from team events to workplace culture.
                    Collect opinions, engage your audience, and turn feedback into action.
                </p>

                <div class="hero-btn">
                    <button class="button btn-primary btn-symbol btn-create-dark" (click)="goToCreate()">Create new
                        survey</button>
                </div>
            </div>

            <div class="hero-image"></div>
        </div>

        <h2>Your Surveys</h2>
        <p class="endingSoon">Ending soon surveys</p>

        <app-ending-soon [surveys]="endingSoonFiltered()" [maxDays]="maxDaysSlider()">
        </app-ending-soon>

        <!--
    <div class="slider-container">
        <label class="endingSoon">Max Days: {{ maxDaysSlider() }}</label>
        <input type="range" min="1" [max]="maxDaysLimit()" [value]="maxDaysSlider()" (input)="onSliderChange($event)" />
    </div>
-->

        <div class="filter-row">
            <div class="filterBtn-content">
                <button class="btn-filter" [class.active]="filter() === 'active'" (click)="setFilter('active')">
                    Active survey
                </button>

                <button class="btn-filter" [class.active]="filter() === 'past'" (click)="setFilter('past')">
                    Past survey
                </button>
            </div>

            <div class="pulldown" [class.open]="categoryOpen()">
                <select name="surveyCategory" (click)="categoryOpen.set(!categoryOpen())"
                    (blur)="categoryOpen.set(false)" [(ngModel)]="filterCategory">
                    <option value="" disabled hidden>Select category</option>

                    @for (c of categories(); track c.id) {
                    <option [value]="c.id">{{ c.label }}</option>
                    }
                </select>
            </div>

        </div>

    </div>
    <div class="survey-list-container">
        <app-survey-list [surveys]="filteredSurveys()">
        </app-survey-list>
    </div>

</section>
