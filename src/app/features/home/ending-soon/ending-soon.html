<div class="ending-soon-grid">
    @for (s of surveys; track s.id) {
    <div class="ending-card" (click)="openSurvey(s.id)">
        <div class="category">{{ categoryService.getLabelById(s.category) }}</div>

        <div class="title">
            {{ s.title }}
        </div>

        <div class="ends-banner">
            Ends in {{ getDaysLeft(s.enddate) }} Days
        </div>

        <div class="progress-bar">
            <div class="fill" [style.width]="getProgressPercent(s.enddate) + '%'"></div>
        </div>
    </div>
    }
</div>
