<div class="survey-card">
    <div class="survey-header">
        <h3>{{ survey.title }}</h3>
        <span class="category">{{ survey.category }}</span>
    </div>

    <p class="description">{{ survey.description }}</p>

    <div class="footer">
        @if (survey.endDate) {
            <span class="end-date">{{ survey.endDate }}</span>
        }
          

        <button class="button small">Open</button>
    </div>
</div>
